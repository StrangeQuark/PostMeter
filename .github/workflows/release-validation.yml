name: Native Release Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      required_artifact_types:
        description: "Comma-separated artifact types required by release validation."
        required: false
        default: "appimage,deb,dmg,zip,exe"

permissions:
  contents: read

jobs:
  build:
    name: Build and validate ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            command: npm run dist:linux
            install_dependencies_command: bash scripts/ci/install-linux-sandbox-backend.sh
            prepare_native_helpers_command: echo "No native helper build required for linux."
            source_smoke_command: |
              xvfb-run -a npm run test:smoke
              xvfb-run -a npm run test:ui:oauth
              xvfb-run -a npm run test:ui
              xvfb-run -a npm run test:ui:regression
              xvfb-run -a npm run test:ui:typography
              xvfb-run -a npm run test:ui:snapshot
            packaged_smoke_command: xvfb-run -a npm run release:validate:packaged-smoke
            packaged_sandbox_command: xvfb-run -a npm run sandbox:validate:packaged
            protocol_command: echo "No protocol registration validation required for linux."
            ci_no_sandbox: "1"
          - platform: windows
            runner: windows-latest
            command: npm run dist:win
            install_dependencies_command: echo "No Linux sandbox backend required for windows."
            prepare_native_helpers_command: npm run native:windows-sandbox:build
            source_smoke_command: echo "Source UI smoke suite is not run on Windows validation runners."
            packaged_smoke_command: npm run release:validate:packaged-smoke
            packaged_sandbox_command: npm run sandbox:validate:packaged
            protocol_command: npm run release:validate:win-protocol
          - platform: macos
            runner: macos-latest
            command: npm run dist:mac
            install_dependencies_command: echo "No Linux sandbox backend required for macos."
            prepare_native_helpers_command: echo "No native helper build required for macos."
            source_smoke_command: |
              npm run test:smoke
              npm run test:ui:oauth
              npm run test:ui
              npm run test:ui:regression
              npm run test:ui:typography
              npm run test:ui:snapshot
            packaged_smoke_command: npm run release:validate:packaged-smoke
            packaged_sandbox_command: npm run sandbox:validate:packaged
            protocol_command: npm run release:validate:mac-protocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install platform dependencies
        run: ${{ matrix.install_dependencies_command }}

      - name: Install
        run: npm ci

      - name: Prepare native helpers
        run: ${{ matrix.prepare_native_helpers_command }}

      - name: Unit tests
        run: npm test

      - name: Electron runtime version
        run: npm run electron:version

      - name: Sandbox runtime validation
        run: npm run sandbox:validate
        env:
          POSTMETER_SANDBOX_VALIDATE_PROGRESS: "1"

      - name: OS sandbox platform matrix validation
        run: npm run sandbox:platform:validate

      - name: Postman parity matrix validation
        run: npm run postman:parity:validate

      - name: Postman docs coverage validation
        run: npm run postman:docs:validate

      - name: Newman report evidence validation
        run: npm run postman:newman-reports:validate

      - name: OAuth provider certification validation
        run: npm run oauth:certify:validate

      - name: Mock OAuth provider certification
        run: npm run oauth:certify:mock

      - name: Source UI smoke suite
        run: ${{ matrix.source_smoke_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/source-ui-smoke

      - name: Production readiness matrix validation
        run: npm run production:readiness:validate

      - name: Electron security matrix validation
        run: npm run electron:security:validate

      - name: Workspace durability matrix validation
        run: npm run workspace:durability:validate

      - name: Non-Postman compatibility matrix validation
        run: npm run compatibility:non-postman:validate

      - name: UX accessibility matrix validation
        run: npm run ux:accessibility:validate

      - name: Diagnostics privacy matrix validation
        run: npm run diagnostics:privacy:validate

      - name: Sandbox release gate manifest
        run: npm run release:gate

      - name: Build unsigned artifacts
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Packaged app startup smoke
        run: ${{ matrix.packaged_smoke_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Packaged sandbox validation
        run: ${{ matrix.packaged_sandbox_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}

      - name: Protocol registration validation
        run: ${{ matrix.protocol_command }}
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Upload validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postmeter-validation-${{ matrix.platform }}-logs
          path: validation-artifacts/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload platform artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postmeter-validation-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.exe
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  validate-release-metadata:
    name: Validate combined release metadata
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List downloaded artifacts
        run: find release -maxdepth 2 -type f -print | sort

      - name: Prepare release metadata
        run: npm run release:prepare

      - name: Validate release metadata
        run: npm run release:validate
        env:
          POSTMETER_RELEASE_REQUIRED_TYPES: ${{ inputs.required_artifact_types }}

      - name: Upload combined validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postmeter-validation-combined
          path: |
            release/*
          if-no-files-found: error
          retention-days: 14
