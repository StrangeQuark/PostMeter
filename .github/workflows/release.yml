name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            command: npm run dist:linux
          - platform: windows
            runner: windows-latest
            command: npm run dist:win
          - platform: macos
            runner: macos-latest
            command: npm run dist:mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Electron runtime version
        run: npm run electron:version

      - name: Build unsigned artifacts
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Validate Windows protocol registration
        if: matrix.platform == 'windows'
        shell: pwsh
        run: npm run release:validate:win-protocol

      - name: Validate macOS protocol registration
        if: matrix.platform == 'macos'
        run: npm run release:validate:mac-protocol

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postmeter-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.msi
            release/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Prepare release metadata
        run: npm run release:prepare

      - name: Validate release metadata
        run: npm run release:validate
        env:
          POSTMETER_RELEASE_REQUIRED_TYPES: appimage,deb,dmg,zip,exe

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release/* \
            --title "PostMeter ${{ github.ref_name }}" \
            --notes "Unsigned PostMeter desktop artifacts. Verify downloads with SHA256SUMS and release-manifest.json."
