name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    env:
      POSTMETER_CI_ELECTRON_NO_SANDBOX: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux sandbox backend
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Postman parity matrix validation
        run: npm run postman:parity:validate

      - name: Postman docs coverage validation
        run: npm run postman:docs:validate

      - name: Newman report evidence validation
        run: npm run postman:newman-reports:validate

      - name: OAuth provider certification validation
        run: npm run oauth:certify:validate

      - name: Mock OAuth provider certification
        run: npm run oauth:certify:mock

      - name: Production readiness matrix validation
        run: npm run production:readiness:validate

      - name: Electron security matrix validation
        run: npm run electron:security:validate

      - name: Workspace durability matrix validation
        run: npm run workspace:durability:validate

      - name: Non-Postman compatibility matrix validation
        run: npm run compatibility:non-postman:validate

      - name: UX accessibility matrix validation
        run: npm run ux:accessibility:validate

      - name: Diagnostics privacy matrix validation
        run: npm run diagnostics:privacy:validate

      - name: Sandbox release gate manifest
        run: npm run release:gate

      - name: Audit high severity
        run: npm audit --audit-level=high

      - name: Electron version
        run: npm run electron:version

      - name: Sandbox runtime validation
        run: npm run sandbox:validate
        env:
          POSTMETER_ALLOW_OS_SANDBOX_VALIDATION_SKIP: "1"

      - name: OS sandbox platform matrix validation
        run: npm run sandbox:platform:validate

      - name: Startup smoke
        run: xvfb-run -a npm run test:smoke
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/startup-smoke

      - name: UI workflow smoke
        run: xvfb-run -a npm run test:ui
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-workflow

      - name: UI regression smoke
        run: xvfb-run -a npm run test:ui:regression
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-regression

      - name: UI OAuth smoke
        run: xvfb-run -a npm run test:ui:oauth
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-oauth

      - name: UI snapshot smoke
        run: xvfb-run -a npm run test:ui:snapshot
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-snapshot

      - name: Linux package smoke
        run: npm run pack:linux

      - name: Packaged app startup smoke
        run: xvfb-run -a npm run release:validate:packaged-smoke
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/linux

      - name: Packaged sandbox validation
        run: xvfb-run -a npm run sandbox:validate:packaged
        env:
          POSTMETER_ALLOW_OS_SANDBOX_VALIDATION_SKIP: "1"

      - name: Upload Linux validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postmeter-ci-linux-validation-logs
          path: validation-artifacts/**
          if-no-files-found: error
          retention-days: 14

  native-packaged-smoke:
    name: Native packaged smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            command: npm run dist:win
            smoke_command: npm run release:validate:packaged-smoke
            sandbox_command: npm run sandbox:validate:packaged
          - platform: macos
            runner: macos-latest
            command: npm run dist:mac
            smoke_command: npm run release:validate:packaged-smoke
            sandbox_command: npm run sandbox:validate:packaged
          - platform: linux
            runner: ubuntu-latest
            command: npm run dist:linux
            smoke_command: xvfb-run -a npm run release:validate:packaged-smoke
            sandbox_command: xvfb-run -a npm run sandbox:validate:packaged
            ci_no_sandbox: "1"
            allow_os_skip: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux sandbox backend
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Install
        run: npm ci

      - name: Build Windows sandbox helper
        if: matrix.platform == 'windows'
        run: npm run native:windows-sandbox:build

      - name: Source-tree sandbox runtime validation
        run: npm run sandbox:validate
        env:
          POSTMETER_ALLOW_OS_SANDBOX_VALIDATION_SKIP: ${{ matrix.allow_os_skip }}

      - name: OS sandbox platform matrix validation
        run: npm run sandbox:platform:validate

      - name: Validate production support matrices
        run: npm run oauth:certify:validate && npm run oauth:certify:mock && npm run production:readiness:validate && npm run electron:security:validate && npm run workspace:durability:validate && npm run compatibility:non-postman:validate && npm run ux:accessibility:validate && npm run diagnostics:privacy:validate

      - name: Build unsigned packaged app
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Packaged app startup smoke
        run: ${{ matrix.smoke_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Packaged sandbox validation
        run: ${{ matrix.sandbox_command }}
        env:
          POSTMETER_ALLOW_OS_SANDBOX_VALIDATION_SKIP: ${{ matrix.allow_os_skip }}
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}

      - name: Validate Windows protocol registration
        if: matrix.platform == 'windows'
        shell: pwsh
        run: npm run release:validate:win-protocol
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Validate macOS protocol registration
        if: matrix.platform == 'macos'
        run: npm run release:validate:mac-protocol
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Upload native package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postmeter-ci-${{ matrix.platform }}-artifacts
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.exe
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

      - name: Upload native validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postmeter-ci-${{ matrix.platform }}-validation-logs
          path: validation-artifacts/**
          if-no-files-found: error
          retention-days: 14
