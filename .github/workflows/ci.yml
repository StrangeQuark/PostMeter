name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Audit high severity
        run: npm audit --audit-level=high

      - name: Electron version
        run: npm run electron:version

      - name: Startup smoke
        run: xvfb-run -a npm run test:smoke
