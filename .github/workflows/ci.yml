name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high

  node:
    runs-on: ubuntu-latest
    env:
      POSTMETER_CI_ELECTRON_NO_SANDBOX: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install sandbox backend
        run: bash scripts/ci/install-linux-sandbox-backend.sh

      - name: Install
        run: npm ci

      - name: Renderer HTML check
        run: npm run renderer:html:check

      - name: Renderer security sink validation
        run: npm run renderer:security:validate

      - name: GitHub workflow security validation
        run: npm run github:workflows:validate

      - name: Secret scanning validation
        run: npm run secrets:validate

      - name: Release governance checklist validation
        run: npm run release:governance:validate

      - name: Refactor structure validation
        run: npm run refactor:structure:validate

      - name: Unit tests
        run: npm test

      - name: Postman parity matrix validation
        run: npm run postman:parity:validate

      - name: Postman docs coverage validation
        run: npm run postman:docs:validate

      - name: Newman report evidence validation
        run: npm run postman:newman-reports:validate

      - name: OAuth provider certification validation
        run: npm run oauth:certify:validate

      - name: Mock OAuth provider certification
        run: npm run oauth:certify:mock

      - name: Production readiness matrix validation
        run: npm run production:readiness:validate

      - name: Electron security matrix validation
        run: npm run electron:security:validate

      - name: Workspace durability matrix validation
        run: npm run workspace:durability:validate

      - name: Non-Postman compatibility matrix validation
        run: npm run compatibility:non-postman:validate

      - name: UX accessibility matrix validation
        run: npm run ux:accessibility:validate

      - name: Diagnostics privacy matrix validation
        run: npm run diagnostics:privacy:validate

      - name: Sandbox release gate manifest
        run: npm run release:gate

      - name: Audit high severity
        run: npm audit --audit-level=high

      - name: Electron version
        run: npm run electron:version

      - name: Sandbox runtime validation
        run: npm run sandbox:validate

      - name: OS sandbox platform matrix validation
        run: npm run sandbox:platform:validate

      - name: Startup smoke
        run: xvfb-run -a npm run test:smoke
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/startup-smoke

      - name: UI workflow smoke
        run: xvfb-run -a npm run test:ui
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-workflow

      - name: UI regression smoke
        run: xvfb-run -a npm run test:ui:regression
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-regression

      - name: UI typography smoke
        run: xvfb-run -a npm run test:ui:typography
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-typography

      - name: UI OAuth smoke
        run: xvfb-run -a npm run test:ui:oauth
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-oauth

      - name: UI Hawk smoke
        run: xvfb-run -a npm run test:ui:hawk
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-hawk

      - name: UI AWS smoke
        run: xvfb-run -a npm run test:ui:aws
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-aws

      - name: UI accessibility smoke
        run: xvfb-run -a npm run test:ui:a11y
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-a11y

      - name: UI auth matrix smoke
        run: xvfb-run -a npm run test:ui:auth
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-auth

      - name: UI snapshot smoke
        run: xvfb-run -a npm run test:ui:snapshot
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/ui-snapshot

      - name: Linux package smoke
        run: npm run pack:linux

      - name: Packaged app startup smoke
        run: xvfb-run -a npm run release:validate:packaged-smoke
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/linux

      - name: Packaged sandbox validation
        run: xvfb-run -a npm run sandbox:validate:packaged

      - name: Upload Linux validation logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: postmeter-ci-linux-validation-logs
          path: validation-artifacts/**
          if-no-files-found: error
          retention-days: 14

  native-packaged-smoke:
    name: Native packaged smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            command: npm run dist:win
            install_dependencies_command: echo "No Linux sandbox backend required for windows."
            prepare_native_helpers_command: npm run native:windows-sandbox:build
            smoke_command: npm run release:validate:packaged-smoke
            packaged_workflow_command: echo "Windows packaged renderer workflow smoke is skipped on GitHub-hosted Windows runners; Linux/macOS cover packaged renderer workflow smoke."
            packaged_auth_command: echo "Windows packaged renderer auth smoke is skipped on GitHub-hosted Windows runners; Linux/macOS cover packaged renderer auth smoke."
            sandbox_command: npm run sandbox:validate:packaged
            protocol_command: npm run release:validate:win-protocol
          - platform: macos
            runner: macos-latest
            command: npm run dist:mac
            install_dependencies_command: echo "No Linux sandbox backend required for macos."
            prepare_native_helpers_command: echo "No native helper build required for macos."
            smoke_command: npm run release:validate:packaged-smoke
            packaged_workflow_command: npm run release:validate:packaged-workflow
            packaged_auth_command: npm run release:validate:packaged-auth
            sandbox_command: npm run sandbox:validate:packaged
            protocol_command: npm run release:validate:mac-protocol
          - platform: linux
            runner: ubuntu-latest
            command: npm run dist:linux
            install_dependencies_command: bash scripts/ci/install-linux-sandbox-backend.sh
            prepare_native_helpers_command: echo "No native helper build required for linux."
            smoke_command: xvfb-run -a npm run release:validate:packaged-smoke
            packaged_workflow_command: xvfb-run -a npm run release:validate:packaged-workflow
            packaged_auth_command: xvfb-run -a npm run release:validate:packaged-auth
            sandbox_command: xvfb-run -a npm run sandbox:validate:packaged
            protocol_command: echo "No protocol registration validation required for linux."
            ci_no_sandbox: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install platform dependencies
        run: ${{ matrix.install_dependencies_command }}

      - name: Install
        run: npm ci

      - name: Renderer HTML check
        run: npm run renderer:html:check

      - name: Renderer security sink validation
        run: npm run renderer:security:validate

      - name: GitHub workflow security validation
        run: npm run github:workflows:validate

      - name: Secret scanning validation
        run: npm run secrets:validate

      - name: Release governance checklist validation
        run: npm run release:governance:validate

      - name: Refactor structure validation
        run: npm run refactor:structure:validate

      - name: Prepare native helpers
        run: ${{ matrix.prepare_native_helpers_command }}

      - name: Ensure Electron runtime
        run: node scripts/ensureElectronRuntime.js --repair

      - name: Source-tree sandbox runtime validation
        run: npm run sandbox:validate

      - name: OS sandbox platform matrix validation
        run: npm run sandbox:platform:validate

      - name: Validate production support matrices
        run: npm run oauth:certify:validate && npm run oauth:certify:mock && npm run production:readiness:validate && npm run electron:security:validate && npm run workspace:durability:validate && npm run compatibility:non-postman:validate && npm run ux:accessibility:validate && npm run diagnostics:privacy:validate

      - name: Build packaged app
        run: ${{ matrix.command }}

      - name: Packaged app startup smoke
        run: ${{ matrix.smoke_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Packaged UI workflow smoke
        run: ${{ matrix.packaged_workflow_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Packaged UI auth matrix smoke
        run: ${{ matrix.packaged_auth_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Packaged sandbox validation
        run: ${{ matrix.sandbox_command }}
        env:
          POSTMETER_CI_ELECTRON_NO_SANDBOX: ${{ matrix.ci_no_sandbox }}

      - name: Protocol registration validation
        run: ${{ matrix.protocol_command }}
        env:
          POSTMETER_VALIDATION_ARTIFACT_DIR: validation-artifacts/${{ matrix.platform }}

      - name: Upload native package artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: postmeter-ci-${{ matrix.platform }}-artifacts
          path: |
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.exe
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Upload native validation logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: postmeter-ci-${{ matrix.platform }}-validation-logs
          path: validation-artifacts/**
          if-no-files-found: error
          retention-days: 14
