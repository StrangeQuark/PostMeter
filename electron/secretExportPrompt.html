<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Secret Values</title>
  <link rel="stylesheet" href="secretExportPrompt.css">
</head>
<body>
  <main>
    <h1 id="title">Export exact secret values</h1>
    <p id="message">Type the confirmation phrase to export tokens, passwords, and secret variables without redaction.</p>
    <section class="phrase-block" aria-label="Required confirmation phrase">
      <span>Confirmation phrase</span>
      <code id="phrase"></code>
    </section>
    <form id="secretExportForm">
      <label>
        Type phrase
        <input id="confirmationInput" autocomplete="off" spellcheck="false" autofocus>
      </label>
      <div id="error" class="error" role="status" aria-live="polite"></div>
      <div class="actions">
        <button id="cancelButton" type="button">Cancel</button>
        <button id="submitButton" type="submit">Export Exact Values</button>
      </div>
    </form>
  </main>
  <script src="secretExportPromptRenderer.js"></script>
</body>
</html>
