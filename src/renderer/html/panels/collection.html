      <section id="collectionMainPanel" class="panel collection-main-panel" role="tabpanel" hidden>
        <div class="collection-main-header">
          <div>
            <div id="collectionMainTitle" class="collection-main-title editable-title" tabindex="0" aria-label="Collection name">Select a collection</div>
          </div>
          <div class="collection-actions">
            <button id="saveCollectionButton" type="button">Save Collection</button>
          </div>
        </div>

        <div class="tabs" role="tablist" aria-label="Collection editor sections" data-tab-group="collection">
          <button id="collectionOverviewTabButton" class="tab active" type="button" role="tab" data-tab-group="collection" data-tab="collectionOverview" aria-selected="true" aria-controls="collectionOverviewTab">Overview</button>
          <button id="collectionAuthTabButton" class="tab" type="button" role="tab" data-tab-group="collection" data-tab="collectionAuth" aria-selected="false" aria-controls="collectionAuthTab">Auth</button>
          <button id="collectionScriptsTabButton" class="tab" type="button" role="tab" data-tab-group="collection" data-tab="collectionScripts" aria-selected="false" aria-controls="collectionScriptsTab">Scripts</button>
          <button id="collectionVariablesTabButton" class="tab" type="button" role="tab" data-tab-group="collection" data-tab="collectionLevelVariables" aria-selected="false" aria-controls="collectionLevelVariablesTab">Variables</button>
        </div>

        <div id="collectionOverviewTab" class="tab-panel active" role="tabpanel" aria-labelledby="collectionOverviewTabButton">
          <div class="markdown-pane collection-overview-field" data-markdown-pane="collectionOverview">
            <div class="markdown-pane-actions">
              <button id="collectionDescriptionSaveButton" class="primary" type="button" hidden>Save</button>
              <button id="collectionDescriptionCancelButton" type="button" hidden>Cancel</button>
            </div>
            <div id="collectionDescriptionPreview" class="markdown-renderer markdown-body" tabindex="0" aria-label="Collection overview"></div>
            <div id="collectionDescriptionEditorShell" class="markdown-editor-shell" hidden>
              <textarea id="collectionDescriptionInput" spellcheck="true" placeholder="Use markdown to describe what this collection is for" aria-label="Collection overview Markdown source" data-code-editor data-code-language="markdown"></textarea>
            </div>
          </div>
        </div>

        <div id="collectionAuthTab" class="tab-panel" role="tabpanel" aria-labelledby="collectionAuthTabButton">
          <div id="collectionAuthEditor"></div>
        </div>

        <div id="collectionScriptsTab" class="tab-panel" role="tabpanel" aria-labelledby="collectionScriptsTabButton">
          <div class="script-grid">
            <label class="field script-field collection-script-field">
              <span>Pre-request Script</span>
              <textarea id="collectionPreRequestScriptInput" spellcheck="false" placeholder="pm.environment.set('token', 'value');" data-code-editor data-code-language="javascript"></textarea>
            </label>
            <label class="field script-field collection-script-field">
              <span>Post-request Script</span>
              <textarea id="collectionTestScriptInput" spellcheck="false" placeholder="pm.test('status is 200', function () { pm.response.to.have.status(200); });" data-code-editor data-code-language="javascript"></textarea>
            </label>
          </div>
        </div>

        <div id="collectionLevelVariablesTab" class="tab-panel" role="tabpanel" aria-labelledby="collectionVariablesTabButton">
          <div class="environment-actions variable-actions">
            <button id="addCollectionVariableButton" type="button">Add Variable</button>
          </div>
          <div id="collectionVariablesTable" class="kv-table"></div>
          <div id="collectionVariablePreview" class="variable-preview">No variables</div>
        </div>
      </section>
